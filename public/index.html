<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="scene" id="scene">

    <!-- ══════════════════════════════════════════════════════
         LAYER 1 — NIGHT ROOM
    ══════════════════════════════════════════════════════ -->
    <svg class="room" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg"
         xmlns:xlink="http://www.w3.org/1999/xlink"
         preserveAspectRatio="xMidYMid slice">
      <defs>

        <!-- ── FILTERS ──────────────────────────────────────────── -->
        <filter id="lampBloom" x="-150%" y="-150%" width="400%" height="400%">
          <feGaussianBlur stdDeviation="14" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="rainBlur" x="-5%" y="-5%" width="110%" height="110%">
          <feGaussianBlur stdDeviation="0.35 0"/>
        </filter>

        <!-- Floor lamp warm glow on wall -->
        <radialGradient id="lampWall" cx="8%" cy="30%" r="40%">
          <stop offset="0%"   stop-color="#FFB030" stop-opacity="0.48"/>
          <stop offset="28%"  stop-color="#FF8C00" stop-opacity="0.22"/>
          <stop offset="65%"  stop-color="#C04800" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
        </radialGradient>

        <!-- Lamp shade inner glow -->
        <radialGradient id="lampGlow" cx="50%" cy="88%" r="52%">
          <stop offset="0%"   stop-color="#FFF4B0" stop-opacity="1"/>
          <stop offset="40%"  stop-color="#FFB030" stop-opacity="0.82"/>
          <stop offset="100%" stop-color="#FF5500" stop-opacity="0"/>
        </radialGradient>

        <!-- Floor lamp floor pool -->
        <radialGradient id="lampFloor" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#FFB030" stop-opacity="0.42"/>
          <stop offset="55%"  stop-color="#C06000" stop-opacity="0.14"/>
          <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
        </radialGradient>

        <!-- Walls -->
        <linearGradient id="wallLeft" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#0D0B06"/>
          <stop offset="100%" stop-color="#0C0C0A"/>
        </linearGradient>
        <linearGradient id="wallRight" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#0B0B09"/>
          <stop offset="100%" stop-color="#080806"/>
        </linearGradient>

        <!-- Floor: dark warm wood -->
        <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#282018"/>
          <stop offset="100%" stop-color="#150E08"/>
        </linearGradient>

        <!-- Vignette -->
        <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
          <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
          <stop offset="72%"  stop-color="#000" stop-opacity="0.48"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0.93"/>
        </radialGradient>

        <!-- Phone drop shadow -->
        <radialGradient id="phoneShadow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#000" stop-opacity="0.62"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0"/>
        </radialGradient>

        <!-- Window glass sheen -->
        <linearGradient id="glassSheen" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#fff" stop-opacity="0.055"/>
          <stop offset="45%"  stop-color="#fff" stop-opacity="0.008"/>
          <stop offset="100%" stop-color="#fff" stop-opacity="0.022"/>
        </linearGradient>

        <!-- Clip for window area -->
        <clipPath id="windowClip">
          <rect x="252" y="58" width="936" height="648"/>
        </clipPath>

      </defs>

      <!-- ── CEILING ─────────────────────────────────────────── -->
      <rect width="1440" height="55" fill="#050403"/>
      <rect width="1440" height="10" fill="#000" opacity="0.55"/>

      <!-- ── WALLS ──────────────────────────────────────────────── -->
      <rect x="0"    y="55" width="252"  height="660" fill="url(#wallLeft)"/>
      <rect x="1188" y="55" width="252"  height="660" fill="url(#wallRight)"/>
      <rect x="252"  y="55" width="936"  height="3"   fill="#080706"/>

      <!-- ── LAMP GLOW ON WALL ──────────────────────────────────── -->
      <rect x="0" y="0" width="580" height="900" fill="url(#lampWall)"/>

      <!-- ══════════════════════════════════════════════════════
           WINDOW — NIGHT CITY
      ══════════════════════════════════════════════════════ -->
      <!-- ── CITY PHOTO ─────────────────────────────────────────── -->
      <image href="/images/night-skyline.jpg" xlink:href="/images/night-skyline.jpg"
             x="252" y="58" width="936" height="648"
             preserveAspectRatio="xMidYMax slice" clip-path="url(#windowClip)"/>

          <line x1="1170" y1="64"  x2="1156" y2="223"  stroke="#7A9AB8" stroke-width="0.7"/>
        </g>

        <g stroke-linecap="round" opacity="0.16">
          <line x1="270"  y1="208" x2="256"  y2="365"  stroke="#7090B0" stroke-width="0.8"/>

          <line x1="348"  y1="202" x2="334"  y2="370"  stroke="#7090B0" stroke-width="1.0"/>

          <line x1="517"  y1="229" x2="503"  y2="400"  stroke="#7090B0" stroke-width="0.8"/>
          <line x1="560"  y1="219" x2="546"  y2="392"  stroke="#6080A0" stroke-width="1.0"/>

          <line x1="1187" y1="249" x2="1173" y2="426"  stroke="#6080A0" stroke-width="0.7"/>
        </g>
        <!-- Lower rain — dimmer, slightly shorter -->
        <g stroke-linecap="round" opacity="0.12">
          <line x1="268"  y1="372" x2="254"  y2="542"  stroke="#607888" stroke-width="0.7"/>

          <line x1="830"  y1="404" x2="816"  y2="582"  stroke="#607888" stroke-width="0.8"/>

          <line x1="1004" y1="410" x2="990"  y2="587"  stroke="#506878" stroke-width="0.6"/>
          <line x1="1047" y1="400" x2="1033" y2="577"  stroke="#607888" stroke-width="0.8"/>
          <line x1="1090" y1="412" x2="1076" y2="590"  stroke="#607888" stroke-width="1.0"/>
          <line x1="1134" y1="402" x2="1120" y2="579"  stroke="#506878" stroke-width="0.7"/>
          <line x1="1177" y1="414" x2="1163" y2="592"  stroke="#607888" stroke-width="0.9"/>
        </g>
      </g>

      <!-- Glass sheen -->
      <rect x="252" y="58" width="936" height="648" fill="url(#glassSheen)"/>
      <!-- Edge condensation hints -->
      <rect x="252" y="58"  width="48"  height="648" fill="#D8E8F8" opacity="0.012"/>
      <rect x="1140" y="58" width="48"  height="648" fill="#D8E8F8" opacity="0.012"/>
      <rect x="252" y="650" width="936" height="56"  fill="#D8E8F8" opacity="0.010"/>

      <!-- ── WINDOW FRAME ─────────────────────────────────────────── -->
      <rect x="238" y="45"  width="964" height="12" fill="#161210" rx="1"/>
      <rect x="238" y="706" width="964" height="12" fill="#161210" rx="1"/>
      <rect x="238" y="45"  width="14"  height="673" fill="#161210" rx="1"/>
      <rect x="1188" y="45" width="14"  height="673" fill="#161210" rx="1"/>
      <rect x="238" y="45"  width="964" height="2"  fill="#2A2218" opacity="0.9"/>

      <rect x="252" y="58"  width="5"   height="648" fill="#000" opacity="0.32"/>

      <rect x="238" y="378" width="964" height="10" fill="#161210"/>
      <rect x="240" y="380" width="960" height="4"  fill="#0C0A08"/>

      <!-- ── BASEBOARD ─────────────────────────────────────────────── -->
      <rect x="0" y="718" width="1440" height="18" fill="#141210" rx="1"/>
      <rect x="0" y="716" width="1440" height="4"  fill="#0A0806"/>
      <rect x="0" y="718" width="1440" height="2"  fill="#201E18" opacity="0.6"/>

      <!-- ── FLOOR ──────────────────────────────────────────────────── -->
      <rect y="736" width="1440" height="164" fill="url(#floorGrad)"/>

        <line x1="0" y1="760" x2="1440" y2="760"/>
        <line x1="0" y1="786" x2="1440" y2="786"/>

      <!-- Wall–floor shadow -->

    <!-- ══════════════════════════════════════════════════════
         LAYER 2 — PHONE  (bottom-anchored, 3/4 visible)
    ══════════════════════════════════════════════════════ -->
    <div class="phone-stage" id="phoneStage">
      <div class="phone" id="phone">
        <div class="phone-frame">

          <!-- Side buttons -->
          <div class="btn-power"></div>
          <div class="btn-vol-up"></div>
          <div class="btn-vol-down"></div>

          <!-- Blank screen -->
          <div class="phone-screen">
            <div class="dynamic-island"></div>
          </div>

          <!-- Home indicator -->
          <div class="home-indicator"></div>

        </div>
      </div>
    </div>

  </div><!-- /scene -->

  <script src="js/app.js"></script>
</body>
</html>
