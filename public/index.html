  <div class="scene" id="scene">

         LAYER 1 — NIGHT ROOM
    ══════════════════════════════════════════════════════ -->
    <svg class="room" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg"
         xmlns:xlink="http://www.w3.org/1999/xlink"
         preserveAspectRatio="xMidYMid slice">
      <defs>

        <!-- ── FILTERS ──────────────────────────────────────────── -->
        <filter id="lampBloom" x="-150%" y="-150%" width="400%" height="400%">
          <feGaussianBlur stdDeviation="14" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="22"/>
        </filter>
        <filter id="coneBlur" x="-30%" y="-10%" width="160%" height="130%">
          <feGaussianBlur stdDeviation="12"/>
        </filter>
        <filter id="rainBlur" x="-5%" y="-5%" width="110%" height="110%">
          <feGaussianBlur stdDeviation="0.35 0"/>
        </filter>

        <!-- Floor lamp cool glow on wall -->
        <radialGradient id="lampWall" cx="8%" cy="30%" r="40%">
          <stop offset="0%"   stop-color="#C8D8FF" stop-opacity="0.28"/>
          <stop offset="28%"  stop-color="#8090C0" stop-opacity="0.12"/>
          <stop offset="65%"  stop-color="#304080" stop-opacity="0.05"/>
          <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
        </radialGradient>

        <!-- Lamp shade inner glow — cool white -->
        <radialGradient id="lampGlow" cx="50%" cy="88%" r="52%">
          <stop offset="0%"   stop-color="#FFFFFF"  stop-opacity="1"/>
          <stop offset="40%"  stop-color="#C8D8FF"  stop-opacity="0.85"/>
          <stop offset="100%" stop-color="#4060B0"  stop-opacity="0"/>
        </radialGradient>

        <!-- Drum shade cylindrical body gradient -->
        <linearGradient id="shadeBody" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#080810" stop-opacity="1"/>
          <stop offset="18%"  stop-color="#1C1E2E" stop-opacity="1"/>
          <stop offset="48%"  stop-color="#2E3248" stop-opacity="1"/>
          <stop offset="78%"  stop-color="#1A1C2A" stop-opacity="1"/>
          <stop offset="100%" stop-color="#0A0A14" stop-opacity="1"/>
        </linearGradient>

        <!-- Floor lamp floor pool — cool -->
        <radialGradient id="lampFloor" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#A0B8E0" stop-opacity="0.30"/>
          <stop offset="55%"  stop-color="#203060" stop-opacity="0.10"/>
          <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
        </radialGradient>

        <!-- Walls -->
        <linearGradient id="wallLeft" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#111116"/>
          <stop offset="100%" stop-color="#141418"/>
        </linearGradient>
        <linearGradient id="wallRight" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#131318"/>
          <stop offset="100%" stop-color="#0F0F13"/>
        </linearGradient>

        <!-- Floor: dark cement gray -->
        <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#1E1E24"/>
          <stop offset="100%" stop-color="#111115"/>
        </linearGradient>

        <!-- Cool city overlay -->
        <linearGradient id="warmOverlay" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%"   stop-color="#000C20" stop-opacity="0.70"/>
          <stop offset="45%"  stop-color="#00081A" stop-opacity="0.40"/>
          <stop offset="100%" stop-color="#000510" stop-opacity="0.15"/>
        </linearGradient>

        <!-- Vignette -->
        <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
          <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
          <stop offset="72%"  stop-color="#000" stop-opacity="0.48"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0.93"/>
        </radialGradient>

        <!-- Phone drop shadow -->
        <radialGradient id="phoneShadow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#000" stop-opacity="0.62"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0"/>
        </radialGradient>

        <!-- Window glass sheen -->
        <linearGradient id="glassSheen" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#8AB0FF" stop-opacity="0.045"/>
          <stop offset="45%"  stop-color="#5080D0" stop-opacity="0.006"/>
          <stop offset="100%" stop-color="#8AB0FF" stop-opacity="0.018"/>
        </linearGradient>

        <!-- Clip for window area -->
        <clipPath id="windowClip">
          <rect x="252" y="58" width="936" height="648"/>
        </clipPath>
