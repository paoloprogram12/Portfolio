         LAYER 1 — NIGHT ROOM
    ══════════════════════════════════════════════════════ -->

        <!-- ── FILTERS ──────────────────────────────────────────── -->
        <filter id="farBlur" x="-2%" y="-2%" width="104%" height="104%">
          <feGaussianBlur stdDeviation="1.8"/>
        </filter>
        <filter id="midBlur" x="-2%" y="-2%" width="104%" height="104%">
          <feGaussianBlur stdDeviation="0.7"/>
        </filter>
        <filter id="lampBloom" x="-150%" y="-150%" width="400%" height="400%">
          <feGaussianBlur stdDeviation="14" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="winBloom" x="-300%" y="-300%" width="700%" height="700%">
          <feGaussianBlur stdDeviation="3.5" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="rainBlur" x="-5%" y="-5%" width="110%" height="110%">
          <feGaussianBlur stdDeviation="0.35 0"/>
        </filter>

        <!-- Night sky: deep indigo fading to amber at horizon -->
        <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#020308"/>
          <stop offset="40%"  stop-color="#04060E"/>
          <stop offset="72%"  stop-color="#09080F"/>
          <stop offset="88%"  stop-color="#140C08"/>
          <stop offset="100%" stop-color="#271804"/>
        </linearGradient>

        <!-- Amber city horizon glow -->
        <radialGradient id="cityGlow" cx="50%" cy="100%" r="68%">
          <stop offset="0%"   stop-color="#FF8800" stop-opacity="0.52"/>
          <stop offset="30%"  stop-color="#C05500" stop-opacity="0.28"/>
          <stop offset="65%"  stop-color="#1A0828" stop-opacity="0.10"/>
          <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
        </radialGradient>

        <!-- Purple/violet light pollution (realistic urban sky) -->
        <radialGradient id="purpleHaze" cx="50%" cy="88%" r="55%">
          <stop offset="0%"   stop-color="#3A1460" stop-opacity="0.22"/>
          <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
        </radialGradient>

        <!-- Floor lamp warm glow on wall -->
        <radialGradient id="lampWall" cx="8%" cy="30%" r="40%">
          <stop offset="0%"   stop-color="#FFB030" stop-opacity="0.48"/>
          <stop offset="28%"  stop-color="#FF8C00" stop-opacity="0.22"/>
          <stop offset="65%"  stop-color="#C04800" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
        </radialGradient>

        <!-- Lamp shade inner glow -->
        <radialGradient id="lampGlow" cx="50%" cy="88%" r="52%">
          <stop offset="0%"   stop-color="#FFF4B0" stop-opacity="1"/>
          <stop offset="40%"  stop-color="#FFB030" stop-opacity="0.82"/>
          <stop offset="100%" stop-color="#FF5500" stop-opacity="0"/>
        </radialGradient>

        <!-- Floor lamp floor pool -->
        <radialGradient id="lampFloor" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#FFB030" stop-opacity="0.42"/>
          <stop offset="55%"  stop-color="#C06000" stop-opacity="0.14"/>
          <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
        </radialGradient>

        <!-- Walls -->
        <linearGradient id="wallLeft" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#0D0B06"/>
          <stop offset="100%" stop-color="#0C0C0A"/>
        </linearGradient>
        <linearGradient id="wallRight" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#0B0B09"/>
          <stop offset="100%" stop-color="#080806"/>
        </linearGradient>

        <!-- Floor: dark warm wood -->
        <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#282018"/>
          <stop offset="100%" stop-color="#150E08"/>
        </linearGradient>

        <!-- Vignette -->
        <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
          <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
          <stop offset="72%"  stop-color="#000" stop-opacity="0.48"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0.93"/>
        </radialGradient>

        <!-- Phone drop shadow -->
        <radialGradient id="phoneShadow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#000" stop-opacity="0.62"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0"/>
        </radialGradient>

        <!-- Window glass sheen -->
        <linearGradient id="glassSheen" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#fff" stop-opacity="0.055"/>
          <stop offset="45%"  stop-color="#fff" stop-opacity="0.008"/>
          <stop offset="100%" stop-color="#fff" stop-opacity="0.022"/>
        </linearGradient>

        <!-- Clip for window area -->
        <clipPath id="windowClip">
          <rect x="252" y="58" width="936" height="648"/>
        </clipPath>
