         LAYER 1 — NIGHT ROOM
    ══════════════════════════════════════════════════════ -->

        <!-- Night sky inside window -->
        <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#04060F"/>
          <stop offset="55%"  stop-color="#080C1A"/>
          <stop offset="85%"  stop-color="#141008"/>
          <stop offset="100%" stop-color="#2A1A06"/>
        </linearGradient>

        <!-- Amber city horizon glow -->
        <radialGradient id="cityGlow" cx="50%" cy="100%" r="60%">
          <stop offset="0%"   stop-color="#FF8C00" stop-opacity="0.45"/>
          <stop offset="40%"  stop-color="#C85A00" stop-opacity="0.22"/>
          <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
        </radialGradient>

        <!-- Floor lamp warm glow on wall -->
        <radialGradient id="lampWall" cx="10%" cy="32%" r="42%">
          <stop offset="0%"   stop-color="#FFB030" stop-opacity="0.38"/>
          <stop offset="35%"  stop-color="#FF8C00" stop-opacity="0.16"/>
          <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
        </radialGradient>

        <!-- Lamp shade inner glow -->
        <radialGradient id="lampGlow" cx="50%" cy="80%" r="50%">
          <stop offset="0%"   stop-color="#FFE080" stop-opacity="1"/>
          <stop offset="60%"  stop-color="#FFB030" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#FF8000" stop-opacity="0"/>
        </radialGradient>

        <!-- Floor lamp floor pool -->
        <radialGradient id="lampFloor" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#FFB030" stop-opacity="0.32"/>
          <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
        </radialGradient>

        <!-- Wall: very dark, almost black with cold blue tint near window -->
        <linearGradient id="wallLeft" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#0A0905"/>
          <stop offset="100%" stop-color="#10100E"/>
        </linearGradient>
        <linearGradient id="wallRight" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#0E0E0C"/>
          <stop offset="100%" stop-color="#090806"/>
        </linearGradient>

        <!-- Floor: dark warm wood -->
        <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#2C2218"/>
          <stop offset="100%" stop-color="#18100A"/>
        </linearGradient>

        <!-- Vignette -->
        <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
          <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0.88"/>
        </radialGradient>

        <!-- Phone drop shadow -->
        <radialGradient id="phoneShadow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#000" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0"/>
        </radialGradient>

        <!-- Window glass frost/reflection -->
        <linearGradient id="glassSheen" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#fff" stop-opacity="0.04"/>
          <stop offset="50%"  stop-color="#fff" stop-opacity="0"/>
          <stop offset="100%" stop-color="#fff" stop-opacity="0.02"/>
        </linearGradient>

        <!-- Clip for window area -->
        <clipPath id="windowClip">
          <rect x="252" y="58" width="936" height="648"/>
        </clipPath>
